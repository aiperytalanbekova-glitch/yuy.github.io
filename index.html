<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Akyuya | Вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Fira Code', 'Segoe UI', monospace;
            background: radial-gradient(circle at 20% 30%, #0a1f0e, #030803);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(transparent, transparent 38px, rgba(72, 255, 72, 0.03) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 38px, rgba(72, 255, 72, 0.03) 40px);
            pointer-events: none;
            z-index: 0;
        }

        .tetro-bg {
            position: fixed;
            bottom: -50px;
            right: -50px;
            font-size: 220px;
            opacity: 0.04;
            pointer-events: none;
            z-index: 0;
            transform: rotate(15deg);
        }

        .auth-card {
            position: relative;
            z-index: 10;
            background: rgba(8, 20, 8, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 460px;
            border: 1px solid rgba(72, 255, 72, 0.35);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(50, 220, 50, 0.1), inset 0 1px 0 rgba(120, 255, 120, 0.2);
            transition: all 0.2s ease;
        }

        h2 {
            font-size: 28px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #a5ffa5;
            text-shadow: 0 0 5px #2aff2a, 0 0 1px #0f0;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #8bcb8b;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 28px;
            border-left: 3px solid #5eff5e;
            padding-left: 12px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            background: #0c1a0c;
            border: 1.5px solid #2a5a2a;
            border-radius: 20px;
            font-size: 15px;
            font-family: monospace;
            color: #cdffcd;
            transition: 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #5eff5e;
            box-shadow: 0 0 12px rgba(94, 255, 94, 0.4);
            background: #071207;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #1f3a1f, #0e2a0e);
            border: 1px solid #5eff5e;
            color: #e3ffe3;
            font-weight: bold;
            font-family: monospace;
            font-size: 18px;
            letter-spacing: 3px;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 18px;
            transition: 0.2s;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #0a2f0a;
        }

        button:hover {
            transform: translateY(-2px);
            background: #2b552b;
            box-shadow: 0 6px 0 #0a2f0a;
            color: #eeffee;
        }

        .switch-text {
            text-align: center;
            margin-top: 24px;
            color: #8fbc8f;
            font-size: 13px;
        }

        .switch-link {
            color: #a0ffa0;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .error-msg {
            background: #2a1212;
            color: #ff9e8f;
            padding: 10px;
            border-radius: 18px;
            font-size: 12px;
            margin-top: 15px;
            text-align: center;
            border-left: 4px solid #ff5555;
        }

        .success-msg {
            background: #102a10;
            color: #96ff96;
            padding: 10px;
            border-radius: 18px;
            font-size: 12px;
            margin-top: 15px;
            text-align: center;
            border-left: 4px solid #5eff5e;
        }

        hr {
            margin: 24px 0;
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, #5eff5e, transparent);
        }

        .demo-hint {
            background: rgba(30, 50, 20, 0.7);
            padding: 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #b8ffb0;
            margin-top: 20px;
            border: 1px dashed #6f9e6f;
            font-family: monospace;
        }

        .demo-hint strong {
            color: #e5ffa0;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .badge-icon {
            display: inline-block;
            margin-right: 6px;
        }
    </style>
</head>
<body>
<div class="tetro-bg">◤◢◣◥◤◢</div>

<div class="auth-card">
    <div id="loginForm">
        <h2><span>🎮</span> Akyuya<span style="color:#43ff43;">UP</span></h2>
        <div class="subtitle">▶ система отслеживания XP-прогресса ◀</div>
        
        <input type="text" id="loginUsername" placeholder="👾 Игрок / Логин" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="🔐 Ключ-код">
        
        <button id="loginBtn">⏎ ВОЙТИ</button>
        
        <div class="switch-text">
            ⚡ Нет профиля? <span class="switch-link" onclick="showRegister()">СОЗДАТЬ АККАУНТ</span>
        </div>
        
        <hr>
        
        <div class="demo-hint">
            💠 <strong>ВАЖНО</strong><br>
            🟢 СОХРАНЯЙТЕ ПАРОЛЬ НА САЙТЕ<br>
            🟢 ПРИ ПОТЕРЕ ПАРОЛЯ ОБРАТИТЕСЬ К АДМИНУ 
        </div>
        
        <div id="loginMessage"></div>
    </div>

    <div id="registerForm" style="display: none;">
        <h2><span>📀</span> NEW GAME+</h2>
        <div class="subtitle">заполни данные, чтобы стартовать</div>
        
        <input type="text" id="regUsername" placeholder="👤 Имя пользователя">
        <input type="email" id="regEmail" placeholder="📧 Эл. почта">
        <input type="password" id="regPassword" placeholder="🔒 Пароль">
        <input type="password" id="regConfirmPassword" placeholder="🔒 Повтори пароль">
        
        <button id="registerBtn">🚀 ЗАРЕГИСТРИРОВАТЬСЯ</button>
        
        <div class="switch-text">
            🔁 Уже есть аккаунт? <span class="switch-link" onclick="showLogin()">ВОЙТИ</span>
        </div>
        
        <div id="registerMessage"></div>
    </div>
</div>

<script>
    function initDatabase() {
        let users = localStorage.getItem("users");
        if (!users) {
            const defaultUsers = [
                {
                    id: 1,
                    username: "Админ",
                    email: "admin@edutracker.com",
                    password: "Админ12345",
                    role: "admin",
                    totalXp: 1420,
                    level: 5,
                    lessonsCompleted: 28,
                    badgesEarned: [1, 2, 3, 4],
                    xpHistory: [1200, 1250, 1300, 1350, 1400, 1410, 1420],
                    createdAt: new Date().toISOString()
                },
                {
                    id: 2,
                    username: "user",
                    email: "user@example.com",
                    password: "user123",
                    role: "user",
                    totalXp: 490,
                    level: 3,
                    lessonsCompleted: 7,
                    badgesEarned: [1],
                    xpHistory: [100, 200, 300, 380, 440, 470, 490],
                    createdAt: new Date().toISOString()
                }
            ];
            localStorage.setItem("users", JSON.stringify(defaultUsers));
        }
        
        const currentUser = localStorage.getItem("currentUser");
        if (currentUser) {
            try {
                const user = JSON.parse(currentUser);
                if (user && user.id) {
                    window.location.href = "dashboard.html";
                }
            } catch(e) {
                localStorage.removeItem("currentUser");
            }
        }
    }

    function showRegister() {
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("registerForm").style.display = "block";
        clearMessages();
    }

    function showLogin() {
        document.getElementById("loginForm").style.display = "block";
        document.getElementById("registerForm").style.display = "none";
        clearMessages();
    }

    function clearMessages() {
        const loginMsg = document.getElementById("loginMessage");
        const regMsg = document.getElementById("registerMessage");
        if (loginMsg) loginMsg.innerHTML = "";
        if (regMsg) regMsg.innerHTML = "";
    }

    function showMessage(elementId, message, isError = true) {
        const element = document.getElementById(elementId);
        if (!element) return;
        element.innerHTML = `<div class="${isError ? 'error-msg' : 'success-msg'}">${message}</div>`;
        setTimeout(() => {
            if (element.innerHTML.includes(message)) element.innerHTML = "";
        }, 3300);
    }

    function register() {
        const username = document.getElementById("regUsername").value.trim();
        const email = document.getElementById("regEmail").value.trim();
        const password = document.getElementById("regPassword").value;
        const confirmPassword = document.getElementById("regConfirmPassword").value;

        if (!username || !password) {
            showMessage("registerMessage", "❌ Заполни имя и пароль!", true);
            return;
        }
        if (password !== confirmPassword) {
            showMessage("registerMessage", "❌ Пароли не совпадают", true);
            return;
        }
        if (password.length < 4) {
            showMessage("registerMessage", "⚠️ Пароль минимум 4 символа", true);
            return;
        }

        let users = JSON.parse(localStorage.getItem("users"));
        if (users.find(u => u.username === username)) {
            showMessage("registerMessage", "⚠️ Такой игрок уже существует", true);
            return;
        }

        const newUser = {
            id: Date.now(),
            username: username,
            email: email || "",
            password: password,
            role: "user",
            totalXp: 0,
            level: 1,
            lessonsCompleted: 0,
            badgesEarned: [],
            xpHistory: [0,0,0,0,0,0,0],
            createdAt: new Date().toISOString()
        };

        users.push(newUser);
        localStorage.setItem("users", JSON.stringify(users));
        showMessage("registerMessage", "✅ Регистрация успешна! Теперь войдите.", false);
        
        setTimeout(() => {
            showLogin();
            document.getElementById("loginUsername").value = username;
            document.getElementById("loginPassword").value = "";
        }, 1500);
    }

    function getXpForLevel(level) {
        return Math.round(100 * Math.log2(level + 1));
    }

    function calculateLevel(totalXp) {
        let level = 1;
        while (totalXp >= getXpForLevel(level + 1)) {
            level++;
        }
        return level;
    }

    function login() {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;

        if (!username || !password) {
            showMessage("loginMessage", "❗ Введи логин и пароль", true);
            return;
        }

        let users = JSON.parse(localStorage.getItem("users"));
        const user = users.find(u => u.username === username && u.password === password);

        if (!user) {
            showMessage("loginMessage", "❌ Неверный логин или пароль", true);
            return;
        }

        const computedLevel = calculateLevel(user.totalXp);
        if (user.level !== computedLevel) {
            user.level = computedLevel;
            const idx = users.findIndex(u => u.id === user.id);
            users[idx] = user;
            localStorage.setItem("users", JSON.stringify(users));
        }

        const sessionUser = {
            id: user.id,
            username: user.username,
            role: user.role,
            totalXp: user.totalXp,
            level: user.level
        };
        localStorage.setItem("currentUser", JSON.stringify(sessionUser));
        
        window.location.href = "dashboard.html";
    }

    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("registerBtn").addEventListener("click", register);
    document.getElementById("loginPassword").addEventListener("keypress", (e) => {
        if (e.key === "Enter") login();
    });
    document.getElementById("regConfirmPassword").addEventListener("keypress", (e) => {
        if (e.key === "Enter") register();
    });

    initDatabase();
</script>
</body>
</html>
